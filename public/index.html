<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Masterpiece Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; transition: background 0.5s; background-color: #f4f4f4; }
        nav { background: #222; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; color: white; }
        nav a { color: #00d4ff; text-decoration: none; font-weight: bold; border: 1px solid #00d4ff; padding: 5px 15px; border-radius: 4px; }
        .container { max-width: 1100px; margin: 40px auto; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; padding: 20px; }
        .paint-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .paint-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
        h1 { margin-bottom: 30px; color: #333; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 1.5rem; font-weight: bold;">ArtVault</div>
    <a href="login.html">Login</a>
</nav>

<div class="container">
    <h1 id="main-heading">World Class Collection</h1>
    <div class="gallery">
        <div class="paint-card"><img id="p1" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=400" alt="Art"><h3>Modern Flow</h3></div>
        <div class="paint-card"><img src="https://images.unsplash.com/photo-1578301978693-85fa9c0320b9?w=400" alt="Art"><h3>Golden Era</h3></div>
        <div class="paint-card"><img src="https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=400" alt="Art"><h3>Abstract Storm</h3></div>
        <div class="paint-card"><img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?w=400" alt="Art"><h3>Deep Forest</h3></div>
        <div class="paint-card"><img src="https://images.unsplash.com/photo-1549490349-8643362247b5?w=400" alt="Art"><h3>Velvet Sky</h3></div>
    </div>
</div>

<script>
    // Apply changes from Dashboard
    window.onload = function() {
        if(localStorage.getItem('siteBg')) document.body.style.backgroundColor = localStorage.getItem('siteBg');
        if(localStorage.getItem('siteTitle')) document.getElementById('main-heading').innerText = localStorage.getItem('siteTitle');
        if(localStorage.getItem('paint1')) document.getElementById('p1').src = localStorage.getItem('paint1');
    };
</script>

</body>
</html>
