<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 97%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #error-msg { color: red; font-size: 0.9rem; margin-bottom: 10px; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <div id="error-msg"></div>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkLogin()">Login</button>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-msg');

        // Logic check for "root" credentials
        if (user === "root" && pass === "root") {
            window.location.href = "dashboard.html";
        } else {
            errorDiv.innerText = "Invalid username or password";
        }
    }
</script>

</body>
</html>
