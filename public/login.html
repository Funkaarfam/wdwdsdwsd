<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; color: white; }
        .login-box { background: #fff; color: #333; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00d4ff; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; }
        #error-msg { color: #e74c3c; font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Access</h2>
    <div id="error-msg"></div>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
</div>

<script>
    function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const err = document.getElementById('error-msg');

        if (u === "root" && p === "root") {
            window.location.href = "dashboard.html";
        } else {
            err.innerText = "Invalid username or password!";
        }
    }
</script>

</body>
</html>
